<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Be at Lukintosh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<nav class="fixed top-0 w-full flex justify-between items-center px-6 py-4 bg-black/80 backdrop-blur z-50">
  <h1 class="font-bold text-lg">Lukintosh</h1>

  <!-- 🌍 idioma -->
  <select id="localeSelector"
          class="bg-black text-white text-sm border border-gray-700 rounded px-2 py-1">
  </select>
</nav>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-6 pt-20">
  <h1 id="title" class="text-6xl md:text-7xl font-black mb-6 fade-in"></h1>

  <p id="subtitle" class="text-gray-400 mb-8 fade-in"></p>

  <a href="#jobs"
     id="viewJobs"
     class="bg-white text-black px-8 py-4 rounded-full font-semibold hover:scale-110 transition fade-in">
  </a>
</section>

<!-- CULTURE -->
<section class="py-24 text-center max-w-3xl mx-auto px-6">
  <h2 id="whyTitle" class="text-3xl font-bold mb-6"></h2>
  <p id="whyText" class="text-gray-400"></p>
</section>

<!-- JOBS -->
<section id="jobs" class="py-24 max-w-4xl mx-auto px-6">
  <h2 id="jobsTitle" class="text-3xl font-bold mb-12 text-center"></h2>

  <div class="space-y-6">
    <div class="border border-gray-800 p-6 rounded-xl">
      <h3>AI Engineer</h3>
      <p id="job1"></p>
    </div>

    <div class="border border-gray-800 p-6 rounded-xl">
      <h3>Game Developer</h3>
      <p id="job2"></p>
    </div>

    <div class="border border-gray-800 p-6 rounded-xl">
      <h3>Full Stack Developer</h3>
      <p id="job3"></p>
    </div>
  </div>
</section>

<!-- LOGIN -->
<section class="py-24 text-center">
  <h2 id="joinTitle" class="text-3xl font-bold mb-6"></h2>

  <a href="https://careers-backend-dhpk.onrender.com/auth/linkedin"
     id="loginBtn"
     class="bg-blue-600 px-8 py-4 rounded-full font-semibold hover:bg-blue-700 transition">
  </a>
</section>

<footer class="text-center text-gray-500 py-8 text-sm">
  © 2026 Lukintosh Corporation
</footer>

<!-- 🌍 SISTEMA GLOBAL -->
<script>

// 🌍 CLDR BASE
const TEXT = {
  en: {
    title: "Be at Lukintosh",
    subtitle: "Build the future. From anywhere.",
    viewJobs: "View Careers",
    whyTitle: "Why Lukintosh?",
    whyText: "Small teams. Massive impact.",
    jobsTitle: "Open Positions",
    job1: "Build AI systems",
    job2: "Create AAA games",
    job3: "Frontend + Backend",
    join: "Join Us",
    login: "Sign in with LinkedIn"
  },

  pt: {
    title: "Esteja na Lukintosh",
    subtitle: "Construa o futuro.",
    viewJobs: "Ver vagas",
    whyTitle: "Por que Lukintosh?",
    whyText: "Times pequenos. Impacto gigante.",
    jobsTitle: "Vagas abertas",
    job1: "Criar IA",
    job2: "Criar jogos AAA",
    job3: "Frontend + Backend",
    join: "Junte-se a nós",
    login: "Entrar com LinkedIn"
  },

  fr: {
    title: "Rejoignez Lukintosh",
    subtitle: "Construisez le futur.",
    viewJobs: "Voir carrières",
    whyTitle: "Pourquoi Lukintosh?",
    whyText: "Petit équipe. Grand impact.",
    jobsTitle: "Postes ouverts",
    job1: "Construire IA",
    job2: "Créer AAA",
    job3: "Frontend + Backend",
    join: "Rejoignez-nous",
    login: "Se connecter"
  }
};

// 🌍 idiomas disponíveis (nome nativo)
const LOCALES = {
  en: "English",
  pt: "Português",
  fr: "Français",
  es: "Español",
  de: "Deutsch",
  ja: "日本語",
  zh: "中文",
  ar: "العربية",
  hi: "हिन्दी"
};

// 🔍 detectar idioma
function detectLocale() {
  const saved = localStorage.getItem("locale");
  if (saved) return saved;

  return navigator.language.split("-")[0];
}

// 🌍 aplicar idioma
function applyLocale() {
  let lang = detectLocale();

  if (!TEXT[lang]) lang = "en";

  const t = TEXT[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("subtitle").innerText = t.subtitle;
  document.getElementById("viewJobs").innerText = t.viewJobs;
  document.getElementById("whyTitle").innerText = t.whyTitle;
  document.getElementById("whyText").innerText = t.whyText;
  document.getElementById("jobsTitle").innerText = t.jobsTitle;
  document.getElementById("job1").innerText = t.job1;
  document.getElementById("job2").innerText = t.job2;
  document.getElementById("job3").innerText = t.job3;
  document.getElementById("joinTitle").innerText = t.join;
  document.getElementById("loginBtn").innerText = t.login;
}

// 🎛️ menu idiomas
function buildSelector() {
  const select = document.getElementById("localeSelector");

  Object.keys(LOCALES).forEach(lang => {
    const opt = document.createElement("option");
    opt.value = lang;
    opt.textContent = LOCALES[lang];
    select.appendChild(opt);
  });

  select.value = detectLocale();

  select.onchange = () => {
    localStorage.setItem("locale", select.value);
    applyLocale();
  };
}

// 🚀 INIT
buildSelector();
applyLocale();

</script>

</body>
</html>
